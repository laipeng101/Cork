name: Build Latest Stable Cork

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # 每周一自动检查更新

jobs:
  build-stable:
    # 依然使用 macOS 26 (Tahoe) 环境
    runs-on: macos-26
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史以检测 Tag

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

      - name: Sync Fork and Checkout Latest Tag
        env:
          FORK_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_BRANCH: main
        run: |
          # 1. 添加上游仓库并拉取
          git remote add upstream https://github.com/buresdv/Cork.git || true
          git fetch upstream --tags
          # 显式 refspec，避免 checkout 的 fetch 配置只拉取单分支导致没有 upstream/<branch>
          git fetch upstream "$UPSTREAM_BRANCH:refs/remotes/upstream/$UPSTREAM_BRANCH"
          
          # 2. 先把 fork 的默认分支合并到最新 upstream，确保 fork 保持同步
          # 显式 refspec，避免没有 origin/<branch> 引用
          git fetch origin "$FORK_BRANCH:refs/remotes/origin/$FORK_BRANCH"
          git checkout -B "$FORK_BRANCH" "refs/remotes/origin/$FORK_BRANCH"
          if git merge --no-edit "upstream/$UPSTREAM_BRANCH"; then
            if ! git push origin "HEAD:$FORK_BRANCH"; then
              echo "::warning::Fork sync push failed (branch may be protected); continuing build."
            fi
          else
            echo "::warning::Fork sync merge failed; continuing build."
            git merge --abort || true
          fi
          
          # 3. 获取最新的版本号 Tag (排除 alpha/beta)
          # 逻辑：列出所有 v 开头的 tag -> 排序 -> 取最后一个
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n 1)
          
          echo "🔥 Detected latest stable version: $LATEST_TAG"
          
          # 4. 切换到这个 Tag 进行编译（保持为纯净的发布版）
          git checkout $LATEST_TAG
          # 注意：fork 的同步发生在上一步；这里仍然只编译 Tag 对应的发布版本

      # --- 环境准备 ---
      
      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Generate Project with Tuist
        run: |
          # 针对 Xcode 26 的安全策略
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          
          tuist install
          # 修改点：添加环境变量 TUIST_SELF_COMPILED=1
          export TUIST_SELF_COMPILED=1
          tuist generate

# --- 编译与打包 ---

      - name: Build Cork (Stable Release)
        run: |
          # 修改点：
          # 1. 添加 -workspace Cork.xcworkspace (解决依赖报错)
          # 2. 将 -scheme Cork 改为 -scheme "Self-Compiled" (解决许可证验证)
          xcodebuild -workspace Cork.xcworkspace -scheme "Self-Compiled" -configuration Release -derivedDataPath build -destination 'platform=macOS,arch=arm64' clean build

      - name: Compress App
        run: |
          APP_PATH=$(find build -name "Cork.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: 未找到 Cork.app，编译可能失败！"
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"
          
          # 获取版本号作为文件名的一部分
          VERSION_NAME=$(git describe --tags --abbrev=0)
          tar -czf "Cork-${VERSION_NAME}.tar.gz" -C "$(dirname "$APP_PATH")" Cork.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cork-Stable-Build
          path: Cork-*.tar.gz
          retention-days: 90
